services:
  - type: pserv
    name: pulseboard-db
    env: postgres
    plan: free
    ipAllowList: []

  - type: web
    name: pulseboard-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://pulseboard-web.onrender.com

  - type: web
    name: pulseboard-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pulseboard-api.onrender.com/api/v1
